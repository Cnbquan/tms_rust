name: Build and Push Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 这一步是核心：在服务器里临时生成一个 Dockerfile，打包完就消失
      - name: Create temporary Dockerfile
        run: |
          cat <<EOF > Dockerfile
          FROM debian:bullseye-slim
          RUN apt-get update && apt-get install -y ca-certificates && rm -rf /var/lib/apt/lists/*
          WORKDIR /app
          COPY tms_rust /app/tms_rust
          RUN chmod +x /app/tms_rust
          ENTRYPOINT ["/app/tms_rust"]
          EOF

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tms-rust:latest
          # 这样它就能找到刚刚生成的那个 Dockerfile 了
